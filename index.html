<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TITLE</title>
</head>
<body>

    <div class="container">
        <div class="center-box">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="logo">
        </div>

        <div class="orbit inner">
            <div class="dot green" style="--angle: 0deg;"></div>
            <div class="dot blue" style="--angle: 90deg;"></div>
            <div class="dot orange" style="--angle: 180deg;"></div>
            <div class="dot blue" style="--angle: 270deg;"></div>
        </div>

        <div class="orbit outer">
            <div class="dot yellow" style="--angle: 30deg;"></div>
            <div class="dot blue" style="--angle: 90deg;"></div>
            <div class="dot green" style="--angle: 150deg;"></div>
            <div class="dot blue" style="--angle: 210deg;"></div>
            <div class="dot red" style="--angle: 270deg;"></div>
            <div class="dot blue" style="--angle: 330deg;"></div>
        </div>
    </div>

</body>
</html>
